services:
  - type: web
    name: krushi-rojgar-backend
    env: node
    region: singapore
    plan: starter
    buildCommand: npm ci && npx prisma generate && npm run build --workspace=backend
    startCommand: npx prisma migrate deploy && node backend/dist/server.js
    healthCheckPath: /health
    numInstances: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        fromDatabase:
          name: krushi-rojgar-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_ACCESS_EXPIRY
        value: 15m
      - key: JWT_REFRESH_EXPIRY
        value: 7d
      - key: BCRYPT_SALT_ROUNDS
        value: 12
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: TWILIO_ENABLED
        value: false
      - key: IVR_GLOBAL_ENABLED
        value: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        value: noreply@krushirojgar.in
      - key: LOG_LEVEL
        value: info
      - key: FRONTEND_URL
        value: https://krushi-rojgar-sandhi.vercel.app
      - key: CORS_ORIGIN
        value: https://krushi-rojgar-sandhi.vercel.app

databases:
  - name: krushi-rojgar-db
    plan: starter
    region: singapore
    databaseName: krushi_rojgar
    user: krushi_admin
    ipAllowList: []
