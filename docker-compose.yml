version: '3.8'

name: krushi-rojgar-sandhi

services:
  postgres:
    image: postgres:16-alpine
    container_name: krushi_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: krushi_admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-krushi_password}
      POSTGRES_DB: krushi_rojgar
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U krushi_admin -d krushi_rojgar']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - krushi_network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: krushi_backend
    restart: unless-stopped
    ports:
      - '5000:5000'
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://krushi_admin:${POSTGRES_PASSWORD:-krushi_password}@postgres:5432/krushi_rojgar
      - FRONTEND_URL=http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - krushi_network

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: krushi_web
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
      - NEXT_PUBLIC_RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID}
    depends_on:
      - backend
    networks:
      - krushi_network

networks:
  krushi_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
